services:
  postgres:
    image: postgres:16
    container_name: ai-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: ai-chat-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    command: ["serve"]

  ollama-init:
    image: ollama/ollama:latest
    container_name: ai-chat-ollama-init
    depends_on:
      - ollama
    entrypoint: ["/bin/sh", "-c"]
    command: ["ollama pull llama3"]
    volumes:
      - ollama_data:/root/.ollama

volumes:
  postgres_data:
  ollama_data:
